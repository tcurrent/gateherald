upstream gateherald_backend {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 443 ssl;
  server_name gateherald.internal;

  # TLS files are environment-specific.
  ssl_certificate /etc/ssl/certs/gateherald.internal.pem;
  ssl_certificate_key /etc/ssl/private/gateherald.internal.key;

  # Static UI bundle location.
  root /var/www/gateherald-ui;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  # If ADMIN_PROXY_SHARED_SECRET is set in the app, forward the same value on admin routes.
  # This pattern is shown in the admin API locations below.

  # Health check can stay public (optional).
  location = /api {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  # Public webhook ingress for external providers.
  location ^~ /webhook/ {
    proxy_pass http://gateherald_backend;
  }

  # Protect templates/config APIs with pluggable auth strategy.
  location ~ ^/api/(templates|configs)(/|$) {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  # Protect UI template catalog endpoint used by builders.
  location = /api/ui/templates {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  # Protect docs API endpoints used by /ui/docs.
  location = /api/ui/docs-index {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  location ~ ^/api/ui/docs/[^/]+$ {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  # Serve UI from static files and require auth.
  location = / {
    return 302 /ui/config-builder;
  }

  location = /ui {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    return 302 /ui/config-builder;
  }

  location = /ui/config-builder {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /config-builder.html =404;
  }

  location = /ui/template-builder {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /template-builder.html =404;
  }

  location = /ui/docs {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /docs.html =404;
  }

  location ~ ^/ui/docs/[^/]+$ {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /docs.html =404;
  }

  location = /ui/docs.js {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /docs.js =404;
  }

  location = /ui/env.js {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /env.js =404;
  }

  location ^~ /ui/dist/ {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    alias /var/www/gateherald-ui/dist/;
  }

  # Optional OIDC callback path if you use oauth2-proxy.
  # location ^~ /oauth2/ {
  #   proxy_pass http://127.0.0.1:4180;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Scheme $scheme;
  # }
}
