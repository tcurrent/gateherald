# Split-host topology reference:
# - Internal host serves UI and applies end-user auth (Basic now, OIDC later)
# - External host exposes webhook/public API and only accepts admin API from internal host

############################
# INTERNAL UI PROXY HOST
############################
upstream gateherald_external_api {
  server api.gateherald.example.com:443;
  keepalive 32;
}

server {
  listen 443 ssl;
  server_name gateherald.internal;

  ssl_certificate /etc/ssl/certs/gateherald.internal.pem;
  ssl_certificate_key /etc/ssl/private/gateherald.internal.key;

  root /var/www/gateherald-ui;

  proxy_http_version 1.1;
  proxy_set_header Host api.gateherald.example.com;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # If ADMIN_PROXY_SHARED_SECRET is set in the app, forward the same value end-to-end.
  # This value is forwarded from internal proxy to external host admin APIs below.

  # UI entrypoints are protected by pluggable auth strategy.
  location = / {
    return 302 /ui/config-builder;
  }

  location = /ui {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    return 302 /ui/config-builder;
  }

  location = /ui/config-builder {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /config-builder.html =404;
  }

  location = /ui/template-builder {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /template-builder.html =404;
  }

  location = /ui/docs {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /docs.html =404;
  }

  location ~ ^/ui/docs/[^/]+$ {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /docs.html =404;
  }

  location = /ui/docs.js {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /docs.js =404;
  }

  location = /ui/env.js {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    try_files /env.js =404;
  }

  location ^~ /ui/dist/ {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    alias /var/www/gateherald-ui/dist/;
  }

  # Admin API traffic is authenticated on this host, then proxied to external API host.
  location ~ ^/api/(templates|configs)(/|$) {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_ssl_server_name on;
    proxy_pass https://gateherald_external_api;
  }

  location = /api/ui/templates {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_ssl_server_name on;
    proxy_pass https://gateherald_external_api;
  }

  location = /api/ui/docs-index {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_ssl_server_name on;
    proxy_pass https://gateherald_external_api;
  }

  location ~ ^/api/ui/docs/[^/]+$ {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_ssl_server_name on;
    proxy_pass https://gateherald_external_api;
  }

  # Internal API passthrough (optional).
  location = /api {
    include /etc/nginx/snippets/gateherald-admin-auth.conf;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_ssl_server_name on;
    proxy_pass https://gateherald_external_api;
  }

  # OIDC callback path when using oauth2-proxy on internal host.
  # location ^~ /oauth2/ {
  #   proxy_pass http://127.0.0.1:4180;
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Scheme $scheme;
  # }
}

############################
# EXTERNAL API/WEBHOOK HOST
############################
upstream gateherald_backend {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 443 ssl;
  server_name api.gateherald.example.com;

  ssl_certificate /etc/ssl/certs/api.gateherald.example.com.pem;
  ssl_certificate_key /etc/ssl/private/api.gateherald.example.com.key;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Keep webhooks publicly reachable.
  location ^~ /webhook/ {
    proxy_pass http://gateherald_backend;
  }

  # API base endpoint is internal-only when frontend-only API mode is enabled.
  location = /api {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  # Lock admin APIs to internal UI proxy egress addresses.
  # Replace CIDRs with your internal proxy host/IP ranges.
  location ~ ^/api/(templates|configs)(/|$) {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  location = /api/ui/templates {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  location = /api/ui/docs-index {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  location ~ ^/api/ui/docs/[^/]+$ {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_set_header X-Gateherald-Proxy-Secret "replace_me_with_admin_proxy_shared_secret";
    proxy_pass http://gateherald_backend;
  }

  # No UI content should be served from the external host.
  location ^~ /ui/ {
    return 404;
  }

  location = / {
    return 404;
  }
}
