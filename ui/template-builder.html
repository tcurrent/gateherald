<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gateherald · Templates</title>
  <link rel="stylesheet" href="./dist/styles.css" />
</head>
<body class="app-body">
  <main class="app-shell">
    <section class="app-brand" aria-label="Gateherald">
      <p class="app-brand-title">Gateherald</p>
      <p class="app-brand-kicker">Webhook Gateway</p>
    </section>

    <div class="app-nav-scroller">
    <nav class="app-nav" id="app-nav">
      <a href="./config-builder.html" class="nav-link">Route Configuration</a>
      <a href="./template-builder.html" class="nav-link active">Templates</a>
      <a href="https://tcurrent.github.io/gateherald/" class="nav-link" target="_blank" rel="noopener noreferrer">Docs</a>
      <form action="/auth/logout" method="post" class="nav-logout-form">
        <button type="submit" class="nav-link nav-link-btn">Logout</button>
      </form>
    </nav>
    </div>

    <section>
      <h1 class="hero-title">Template Builder</h1>
      <p class="hero-copy">Create, edit, and delete template records stored in the database.</p>
    </section>

    <section class="section-card">
      <div class="section-header">
        <span>
          <span class="section-header-label">Template Records</span>
          <span class="section-header-copy">Manage saved templates in a static editor layout.</span>
        </span>
      </div>
      <div class="section-body">
        <div class="panel-grid">
          <div class="field-block field-half">
            <label for="templateRecordSelect" class="form-label">Saved Templates</label>
            <select id="templateRecordSelect" class="input-base"></select>
          </div>
          <div class="field-block field-half">
            <label class="form-label">&nbsp;</label>
            <div class="panel-grid !mb-0">
              <div class="field-half"><button id="loadTemplateRecordBtn" type="button" class="btn btn-secondary" disabled>Load Template</button></div>
              <div class="field-half"><button id="newTemplateRecordBtn" type="button" class="btn btn-secondary">New Template</button></div>
            </div>
          </div>
        </div>

        <div class="panel-grid">
          <div class="field-block field-third">
            <label for="templateRecordName" class="form-label required">Template Name</label>
            <input id="templateRecordName" placeholder="Enter template name" class="input-base" />
          </div>
          <div class="field-block field-third">
            <label for="templateNeedsDocs" class="form-label">Needs Documentation Rules</label>
            <select id="templateNeedsDocs" class="input-base">
              <option value="false" selected>false</option>
              <option value="true">true</option>
            </select>
          </div>
          <div id="templateDocTargetFieldBlock" class="field-block field-third">
            <label for="templateDocTargetField" class="form-label">Documentation Target Field</label>
            <input id="templateDocTargetField" placeholder="Enter field name" class="input-base" />
          </div>
        </div>

        <div class="panel-grid">
          <div class="field-block field-full">
            <label for="templateFieldsJson" class="form-label required">Template Fields (JSON Object)</label>
            <textarea id="templateFieldsJson" placeholder='{"alertTitle":"","alertDocumentation":""}' class="textarea-base textarea-lg" spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
          </div>
        </div>

        <div class="panel-grid">
          <div class="field-half"><button id="saveTemplateRecordBtn" type="button" class="btn btn-primary">Save Template</button></div>
          <div class="field-half"><button id="deleteTemplateRecordBtn" type="button" class="btn btn-warn">Delete Template</button></div>
        </div>

        <div id="templateRecordStatus" class="status-text"></div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var nav = document.getElementById('app-nav');
      var wrapper = nav && nav.parentElement;
      function checkScroll() {
        if (!nav || !wrapper) return;
        var atEnd = nav.scrollLeft + nav.clientWidth >= nav.scrollWidth - 4;
        wrapper.classList.toggle('scrolled-end', atEnd);
        wrapper.classList.toggle('scrolled-start', nav.scrollLeft > 0);
      }
      if (nav) {
        nav.addEventListener('scroll', checkScroll, { passive: true });
        var active = nav.querySelector('.nav-link.active');
        if (active) { active.scrollIntoView({ block: 'nearest', inline: 'center' }); }
        checkScroll();
      }
    }());
  </script>

  <script src="./env.js"></script>
  <script src="./template-builder.js"></script>
</body>
</html>
